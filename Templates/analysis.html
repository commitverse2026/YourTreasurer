{% extends "base.html" %}

{% block head %}
<style>
    .chart-container {
        position: relative;
        height: 60vh;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 12px;
    }
    
    .toggle-grp {
        text-align: center;
        margin-bottom: 20px;
    }
    
    .btn-toggle {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255,255,255,0.4);
        padding: 10px 20px;
        color: white;
        cursor: pointer;
        border-radius: 20px;
        font-weight: 600;
        transition: 0.3s;
    }
    .btn-toggle.active {
        background: white;
        color: black;
    }
</style>
{% endblock %}

{% block content %}
<div class="content-container">
    <h1 class="title">Visual Intelligence</h1>
    <p class="subtitle">Analyze your spending patterns</p>

    <div class="toggle-grp">
        <button class="btn-toggle active" id="btnMonth">Month View</button>
        <button class="btn-toggle" id="btnDay">Day View</button>
    </div>

    <div class="chart-container">
        <canvas id="spendChart"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let myChart = null;

    async function loadChartData(viewType = 'month') {
        const res = await fetch(`/api/spend_data?view=${viewType}`);
        const data = await res.json();
        
        const ctx = document.getElementById('spendChart').getContext('2d');
        
        // Destroy existing chart if updating to trigger animation
        if(myChart) {
            myChart.destroy();
        }
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: data.categories,
                datasets: [{
                    label: 'Amount spent',
                    data: data.amounts,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.7)',
                        'rgba(54, 162, 235, 0.7)',
                        'rgba(255, 206, 86, 0.7)',
                        'rgba(75, 192, 192, 0.7)',
                        'rgba(153, 102, 255, 0.7)',
                        'rgba(255, 159, 64, 0.7)'
                    ],
                    borderColor: 'rgba(255,255,255,0.5)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: 'white' }
                    }
                },
                animation: {
                    animateRotate: true,
                    animateScale: true
                }
            }
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadChartData('month');
        
        document.getElementById('btnMonth').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('btnDay').classList.remove('active');
            loadChartData('month');
        });
        
        document.getElementById('btnDay').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('btnMonth').classList.remove('active');
            loadChartData('day');
        });
    });
</script>
{% endblock %}
