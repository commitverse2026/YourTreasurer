<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis | YourTreasurer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analysis-container {
            max-width: 900px;
            margin: auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(15, 40, 84, 0.1);
            backdrop-filter: blur(10px);
        }
        .analysis-title {
            color: var(--navy-dark);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }
        .analysis-subtitle {
            color: var(--blue-mid);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 30px;
        }
        .toggle-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .toggle-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--navy-dark), var(--blue-mid));
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 40, 84, 0.2);
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, var(--blue-soft), var(--blue-mid));
        }
        .chart-wrapper {
            max-width: 500px;
            margin: auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(15, 40, 84, 0.1);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.95));
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(15, 40, 84, 0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(15, 40, 84, 0.15);
        }
        .stat-label {
            color: var(--blue-mid);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .stat-value {
            color: var(--navy-dark);
            font-size: 1.8rem;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="brand-logo-top">
        <a href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="YourTreasurer Logo"></a>
    </div>

    <button class="menu-trigger" id="menu-btn"><span>☰ Menu</span></button>
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <nav id="side-nav" class="side-nav">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/my_profile">My Profile</a>
            <a href="/my_expenses">My Expenses</a>
            <a href="/analysis" class="active">Analysis</a>
            <a href="/interval_spend">Interval Spend</a>
            <a href="/about_us">About Us</a>
        </div>
    </nav>

    <div class="dynamic-bg" style='background-image: url("{{ url_for('static', filename='images/bg.svg') }}");'></div>

    <div class="main-layout-wrapper">
        <div class="analysis-container">
            <h1 class="analysis-title">Spending Analysis</h1>
            <p class="analysis-subtitle">Visualize your financial behavior intelligently</p>

            <div class="toggle-buttons">
                <button id="dayBtn" class="toggle-btn active">Day View</button>
                <button id="monthBtn" class="toggle-btn">Month View</button>
            </div>

            <div class="chart-wrapper">
                <canvas id="chart"></canvas>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Spent</div>
                    <div id="total" class="stat-value">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Top Category</div>
                    <div id="top" class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Categories</div>
                    <div id="count" class="stat-value">0</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="common-footer">
        YourTreasurer &copy; 2026 | Helping Hand
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideNav = document.getElementById('side-nav');
        const backdrop = document.getElementById('menu-backdrop');

        function playWhoosh() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function toggleMenu() {
            sideNav.classList.toggle('open');
            backdrop.classList.toggle('active');
            if (sideNav.classList.contains('open')) {
                playWhoosh();
            }
        }

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);

        // Chart.js
        let chart;

        async function getData() {
            try {
                let res = await fetch('/api/spend_data');
                return await res.json();
            } catch {
                return {
                    categories: ["Food", "Travel", "Rent", "Fun"],
                    amounts: [500, 300, 4000, 200]
                }
            }
        }

        function updateStats(data) {
            let total = data.amounts.reduce((a, b) => a + b, 0);
            document.getElementById('total').innerText = "₹" + total;

            if (data.amounts.length > 0) {
                let max = Math.max(...data.amounts);
                let idx = data.amounts.indexOf(max);
                document.getElementById('top').innerText = data.categories[idx];
            }

            document.getElementById('count').innerText = data.categories.length;
        }

        async function init() {
            let data = await getData();

            const ctx = document.getElementById('chart');

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.categories,
                    datasets: [{
                        data: data.amounts,
                        backgroundColor: [
                            '#00E0FF', '#00FFA3', '#7EC8E3', '#4988C4', '#1C4D8D', '#FF6B6B'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Poppins',
                                    size: 12
                                }
                            }
                        }
                    },
                    animation: {
                        animateRotate: true,
                        animateScale: true
                    }
                }
            });

            updateStats(data);
        }

        async function getHourlyData() {
            try {
                let res = await fetch('/api/hourly_data');
                return await res.json();
            } catch {
                return {
                    labels: ["0:00", "6:00", "12:00", "18:00"],
                    amounts: [0, 100, 300, 150]
                }
            }
        }

        document.getElementById('dayBtn').onclick = async function() {
            this.classList.add('active');
            document.getElementById('monthBtn').classList.remove('active');
            let data = await getHourlyData();
            chart.data.labels = data.labels;
            chart.data.datasets[0].data = data.amounts;
            chart.update();
        };

        document.getElementById('monthBtn').onclick = async function() {
            this.classList.add('active');
            document.getElementById('dayBtn').classList.remove('active');
            let data = await getData();
            chart.data.labels = data.categories;
            chart.data.datasets[0].data = data.amounts;
            chart.update();
        };

        init();
    </script>
</body>
</html>
