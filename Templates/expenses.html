<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expenses | YourTreasurer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="brand-logo-top">
        <a href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" onerror="this.style.display='none'"></a>
    </div>
    <button class="menu-trigger" id="menu-btn"><span>☰ Menu</span></button>
    <div class="menu-backdrop" id="menu-backdrop"></div>
    <nav id="side-nav" class="side-nav">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/my_profile">My Profile</a>
            <a href="/my_expenses" class="active">My Expenses</a>
            <a href="/analysis">Analysis</a>
            <a href="/interval_spend">Interval Spend</a>
            <a href="/about_us">About Us</a>
            <a href="/logout" style="opacity:0.4; font-size:1rem;">Logout</a>
        </div>
    </nav>
    <div class="dynamic-bg" style="background: linear-gradient(135deg, #BDE8F5 0%, #e8f4fd 100%);"></div>
    <div class="main-layout-wrapper">
        <div style="background:rgba(255,255,255,0.9);padding:40px;border-radius:20px;text-align:center;max-width:500px;">
            <h2 style="color:var(--navy-dark);font-size:2rem;">My Expenses</h2>
            <p style="color:var(--blue-mid);margin-top:10px;">Coming in Task 3 🚀</p>
            <a href="/" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--navy-dark);color:white;border-radius:12px;text-decoration:none;font-weight:700;">← Back Home</a>
        </div>
    </div>
    <footer class="common-footer">YourTreasurer &copy; 2026 | Helping Hand</footer>
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideNav = document.getElementById('side-nav');
        const backdrop = document.getElementById('menu-backdrop');
        function toggleMenu() { sideNav.classList.toggle('open'); backdrop.classList.toggle('active'); }
        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
