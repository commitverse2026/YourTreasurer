<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend History | Your Expenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #718096;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #718096;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Add Expense Form */
        .add-expense-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .add-expense-card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        /* Expenses List */
        .expenses-list {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .expenses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .expenses-header h2 {
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        /* Expense Cards - Slide-in Animation */
        .expense-cards {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .expense-card {
            background: white;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #667eea;
            transition: all 0.3s;
            
            /* Slide-in animation */
            animation: slideInFromBottom 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .expense-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Different animation delays for each card */
        .expense-card:nth-child(1) { animation-delay: 0.05s; }
        .expense-card:nth-child(2) { animation-delay: 0.1s; }
        .expense-card:nth-child(3) { animation-delay: 0.15s; }
        .expense-card:nth-child(4) { animation-delay: 0.2s; }
        .expense-card:nth-child(5) { animation-delay: 0.25s; }
        .expense-card:nth-child(6) { animation-delay: 0.3s; }
        .expense-card:nth-child(7) { animation-delay: 0.35s; }
        .expense-card:nth-child(8) { animation-delay: 0.4s; }
        .expense-card:nth-child(9) { animation-delay: 0.45s; }
        .expense-card:nth-child(10) { animation-delay: 0.5s; }

        @keyframes slideInFromBottom {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .expense-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2;
        }

        .expense-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .expense-details h4 {
            color: #2d3748;
            margin-bottom: 5px;
        }

        .expense-details p {
            color: #718096;
            font-size: 0.8rem;
        }

        .expense-amount {
            text-align: right;
            min-width: 120px;
        }

        .amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
        }

        .date {
            font-size: 0.7rem;
            color: #a0aec0;
            margin-top: 5px;
        }

        .delete-btn {
            background: #fee2e2;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #ef4444;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #a0aec0;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        /* Scrollbar */
        .expense-cards::-webkit-scrollbar {
            width: 6px;
        }

        .expense-cards::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .expense-cards::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .expense-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .expense-amount {
                text-align: left;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📊</span> Real-Time Spend History
            </h1>
            <p>Track all your expenses with beautiful animations</p>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalExpenses">0</div>
                <div class="stat-label">Total Expenses</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💸</div>
                <div class="stat-value" id="totalAmount">₹0</div>
                <div class="stat-label">Total Spent</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="avgExpense">₹0</div>
                <div class="stat-label">Average Expense</div>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="add-expense-card">
            <h2>➕ Add New Expense</h2>
            <div id="formAlert"></div>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="🍔 Food & Dining">🍔 Food & Dining</option>
                            <option value="🚗 Transportation">🚗 Transportation</option>
                            <option value="🛒 Groceries">🛒 Groceries</option>
                            <option value="🎬 Entertainment">🎬 Entertainment</option>
                            <option value="🏠 Rent">🏠 Rent</option>
                            <option value="📚 Education">📚 Education</option>
                            <option value="💊 Healthcare">💊 Healthcare</option>
                            <option value="👕 Shopping">👕 Shopping</option>
                            <option value="📱 Utilities">📱 Utilities</option>
                            <option value="✈️ Travel">✈️ Travel</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="What was this expense for?">
                </div>
                <button type="submit" class="btn-submit">➕ Add Expense</button>
            </form>
        </div>

        <!-- Expenses List -->
        <div class="expenses-list">
            <div class="expenses-header">
                <h2>
                    <span>📋</span> Recent Expenses
                    <span id="expenseCount" style="font-size: 0.8rem; color: #718096;"></span>
                </h2>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="Today">Today</button>
                    <button class="filter-btn" data-filter="This Week">This Week</button>
                    <button class="filter-btn" data-filter="This Month">This Month</button>
                </div>
            </div>
            <div class="expense-cards" id="expenseCards">
                <div class="empty-state">Loading expenses...</div>
            </div>
        </div>
    </div>

    <script>
        let allExpenses = [];
        let currentFilter = 'all';

        // Play crumple sound for delete
        function playCrumpleSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 200;
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) {
                console.log('Audio not supported');
            }
        }

        // Play coin sound for adding expense
        function playCoinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch(e) {
                console.log('Audio not supported');
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('formAlert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 3000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function filterExpenses() {
            if (currentFilter === 'all') return allExpenses;
            
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            return allExpenses.filter(exp => {
                const expDate = new Date(exp.created_at);
                
                if (currentFilter === 'Today') {
                    return expDate >= today;
                } else if (currentFilter === 'This Week') {
                    const weekAgo = new Date(today - 7 * 24 * 60 * 60 * 1000);
                    return expDate >= weekAgo;
                } else if (currentFilter === 'This Month') {
                    return expDate.getMonth() === now.getMonth() && 
                           expDate.getFullYear() === now.getFullYear();
                }
                return true;
            });
        }

        function updateStats() {
            const filtered = filterExpenses();
            const totalCount = filtered.length;
            const totalAmount = filtered.reduce((sum, exp) => sum + exp.amount, 0);
            const avgAmount = totalCount > 0 ? totalAmount / totalCount : 0;
            
            document.getElementById('totalExpenses').innerText = totalCount;
            document.getElementById('totalAmount').innerHTML = `₹${totalAmount.toLocaleString()}`;
            document.getElementById('avgExpense').innerHTML = `₹${avgAmount.toFixed(0)}`;
            document.getElementById('expenseCount').innerHTML = `(${totalCount} expenses)`;
        }

        function renderExpenses() {
            const container = document.getElementById('expenseCards');
            const filtered = filterExpenses();
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No expenses found. Add your first expense above!</div>';
                updateStats();
                return;
            }
            
            container.innerHTML = filtered.map(expense => {
                let icon = '💰';
                if (expense.category.includes('Food')) icon = '🍔';
                else if (expense.category.includes('Transport')) icon = '🚗';
                else if (expense.category.includes('Grocery')) icon = '🛒';
                else if (expense.category.includes('Entertainment')) icon = '🎬';
                else if (expense.category.includes('Rent')) icon = '🏠';
                else if (expense.category.includes('Education')) icon = '📚';
                else if (expense.category.includes('Healthcare')) icon = '💊';
                else if (expense.category.includes('Shopping')) icon = '👕';
                else if (expense.category.includes('Utilities')) icon = '📱';
                else if (expense.category.includes('Travel')) icon = '✈️';
                
                return `
                    <div class="expense-card" data-id="${expense._id}">
                        <div class="expense-info">
                            <div class="expense-icon">${icon}</div>
                            <div class="expense-details">
                                <h4>${escapeHtml(expense.category)}</h4>
                                <p>${expense.description ? escapeHtml(expense.description) : 'No description'}</p>
                            </div>
                        </div>
                        <div class="expense-amount">
                            <div class="amount">₹${expense.amount.toLocaleString()}</div>
                            <div class="date">${formatDate(expense.created_at)}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteExpense('${expense._id}')">🗑️</button>
                    </div>
                `;
            }).join('');
            
            updateStats();
        }

        async function loadExpenses() {
            try {
                const response = await fetch('/api/get_expenses');
                if (!response.ok) throw new Error('Failed to load');
                
                allExpenses = await response.json();
                renderExpenses();
            } catch (error) {
                console.error('Error loading expenses:', error);
                document.getElementById('expenseCards').innerHTML = '<div class="empty-state">❌ Error loading expenses. Please login first.</div>';
            }
        }

        async function addExpense(event) {
            event.preventDefault();
            
            const expenseData = {
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                description: document.getElementById('description').value
            };
            
            if (isNaN(expenseData.amount) || expenseData.amount <= 0) {
                showAlert('Please enter a valid amount', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/add_expense_direct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(expenseData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    playCoinSound();
                    showAlert('Expense added successfully!', 'success');
                    document.getElementById('expenseForm').reset();
                    await loadExpenses();
                } else {
                    showAlert(result.error || 'Failed to add expense', 'error');
                }
            } catch (error) {
                showAlert('Network error', 'error');
            }
        }

        async function deleteExpense(expenseId) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            
            try {
                const response = await fetch(`/api/delete_expense/${expenseId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    playCrumpleSound();
                    showAlert('Expense deleted successfully!', 'success');
                    await loadExpenses();
                } else {
                    showAlert(result.error || 'Failed to delete expense', 'error');
                }
            } catch (error) {
                showAlert('Network error', 'error');
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event listeners
        document.getElementById('expenseForm').addEventListener('submit', addExpense);
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderExpenses();
            });
        });

        // Load expenses on page load
        loadExpenses();
    </script>
</body>
</html>
