<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expenses | YourTreasurer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            overflow-x: hidden;
            overflow-y: auto;
            height: auto;
            min-height: 100%;
        }
        .main-layout-wrapper {
            display: block;
            padding: 100px 20px 170px;
            min-height: calc(100vh - 70px);
            position: relative;
            z-index: 1;
            width: min(100%, 860px);
            margin: 0 auto;
        }
        .scroll-tail {
            height: 130px;
            margin-top: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.82);
        }
        .card {
            width: 100%;
            margin: 0;
            padding: 32px 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 48px rgba(15, 40, 84, 0.14);
            text-align: left;
            backdrop-filter: blur(10px);
        }
        .card h1 { color: var(--navy-dark); margin-bottom: 8px; font-size: clamp(1.8rem, 3vw, 2.3rem); }
        .card p { color: var(--blue-mid); margin-bottom: 22px; }
        .form-grid { display: grid; gap: 14px; }
        .form-grid label { font-weight: 600; color: var(--navy-dark); display: block; margin-bottom: 6px; }
        .form-grid input, .form-grid select {
            width: 100%; border: 1px solid rgba(26, 83, 168, 0.18); border-radius: 14px;
            padding: 12px 14px; font-size: 0.98rem; font-family: inherit; background: #f9fbff;
        }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 6px 0 0; }
        .checkbox-row input { width: 18px; height: 18px; }
        .loan-fields {
            display: none; gap: 12px; border: 1px dashed rgba(26, 83, 168, 0.25);
            background: rgba(73, 136, 196, 0.08); padding: 14px; border-radius: 14px;
        }
        .loan-fields.visible { display: grid; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .btn-primary {
            border: none; border-radius: 12px; padding: 12px 18px;
            background: linear-gradient(135deg, var(--navy-dark), var(--blue-mid));
            color: #fff; font-weight: 700; cursor: pointer;
        }
        .btn-secondary {
            border: 1px solid rgba(26, 83, 168, 0.25); border-radius: 12px; padding: 12px 18px;
            background: #fff; color: var(--navy-dark); font-weight: 700; cursor: pointer;
        }
        .status { min-height: 1.3em; font-size: 0.95rem; color: var(--blue-mid); }
        .status.error { color: #9f1d1d; }
        .status.success { color: #115e2e; }

        .coin-rain { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 2000; }
        .coin {
            position: absolute; top: -40px; width: 24px; height: 24px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff2ab 0%, #ffcd3c 45%, #d59a0d 100%);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2); display: grid; place-items: center;
            color: #8a5b00; font-weight: 800; animation: fall linear forwards;
        }
        @keyframes fall {
            from { transform: translateY(-40px) rotate(0deg); opacity: 1; }
            to { transform: translateY(110vh) rotate(540deg); opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="brand-logo-top"><a href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo"></a></div>
    <button class="menu-trigger" id="menu-btn"><span>Menu</span></button>
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <nav id="side-nav" class="side-nav">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/my_profile">My Profile</a>
            <a href="/my_expenses" class="active">My Expenses</a>
            <a href="/analysis">Analysis</a>
            <a href="/interval_spend">Interval Spend</a>
            <a href="/about_us">About Us</a>
        </div>
    </nav>

    <div class="dynamic-bg" style="background-image: url('{{ url_for('static', filename='images/expenses.avif') }}');"></div>

    <div class="main-layout-wrapper">
        <section class="card">
            <h1>Daily Expense Entry</h1>
            <p>Enter expense details, then click <strong>Get History (Real-Time)</strong> to open your live history page.</p>

            <form id="expense-form" class="form-grid">
                <div>
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select category</option>
                        <option value="Educational">Educational</option>
                        <option value="Lifestyle">Lifestyle</option>
                        <option value="Healthy Food">Healthy Food</option>
                        <option value="Junk Food">Junk Food</option>
                        <option value="Hostel Rent">Hostel Rent</option>
                        <option value="Travelling">Travelling</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label for="spent_at">Where was it spent?</label>
                    <input id="spent_at" name="spent_at" type="text" placeholder="e.g. Cafe, Online Store" required>
                </div>

                <div>
                    <label for="amount">Amount</label>
                    <input id="amount" name="amount" type="number" min="1" step="0.01" placeholder="e.g. 250" required>
                </div>

                <label class="checkbox-row" for="is_loan">
                    <input id="is_loan" name="is_loan" type="checkbox">
                    <span>Is it a Loan?</span>
                </label>

                <div id="loan-fields" class="loan-fields">
                    <div>
                        <label for="friend_email">Friend's Email</label>
                        <input id="friend_email" name="friend_email" type="email" placeholder="friend@example.com">
                    </div>
                    <div>
                        <label for="relationship">Relationship</label>
                        <input id="relationship" name="relationship" type="text" placeholder="Classmate / Roommate">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-primary" type="submit">Save Expense</button>
                    <button id="history-btn" class="btn-secondary" type="button">Get History (Real-Time)</button>
                </div>
                <div id="status" class="status"></div>
            </form>
        </section>
        <div class="scroll-tail" aria-hidden="true"></div>
    </div>

    <div id="coin-rain" class="coin-rain"></div>

    <footer class="common-footer">YourTreasurer &copy; 2026 | Helping Hand</footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideNav = document.getElementById('side-nav');
        const backdrop = document.getElementById('menu-backdrop');

        const expenseForm = document.getElementById('expense-form');
        const historyBtn = document.getElementById('history-btn');
        const loanToggle = document.getElementById('is_loan');
        const loanFields = document.getElementById('loan-fields');
        const friendEmail = document.getElementById('friend_email');
        const relationship = document.getElementById('relationship');
        const statusNode = document.getElementById('status');
        const coinRain = document.getElementById('coin-rain');

        function toggleMenu() {
            sideNav.classList.toggle('open');
            backdrop.classList.toggle('active');
        }

        function setLoanFieldVisibility() {
            const isLoan = loanToggle.checked;
            loanFields.classList.toggle('visible', isLoan);
            friendEmail.required = isLoan;
            relationship.required = isLoan;
        }

        function playCoinClink() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;
            const ctx = new AudioCtx();
            const now = ctx.currentTime;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.001, now);
            gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            gain.connect(ctx.destination);

            const t1 = ctx.createOscillator();
            t1.type = 'triangle';
            t1.frequency.setValueAtTime(920, now);
            t1.connect(gain);
            t1.start(now);
            t1.stop(now + 0.18);

            const t2 = ctx.createOscillator();
            t2.type = 'sine';
            t2.frequency.setValueAtTime(1280, now + 0.1);
            t2.connect(gain);
            t2.start(now + 0.1);
            t2.stop(now + 0.35);
        }

        function runMoneyDrop() {
            coinRain.innerHTML = '';
            for (let i = 0; i < 24; i += 1) {
                const coin = document.createElement('div');
                coin.className = 'coin';
                coin.textContent = '₹';
                coin.style.left = `${Math.random() * 100}vw`;
                coin.style.animationDuration = `${1.5 + Math.random() * 1.2}s`;
                coin.style.animationDelay = `${Math.random() * 0.4}s`;
                coinRain.appendChild(coin);
            }
            setTimeout(() => { coinRain.innerHTML = ''; }, 3200);
        }

        expenseForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            statusNode.className = 'status';
            statusNode.textContent = 'Saving expense...';

            const payload = {
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value,
                spent_at: document.getElementById('spent_at').value.trim(),
                is_loan: loanToggle.checked,
                friend_email: friendEmail.value.trim(),
                relationship: relationship.value.trim()
            };

            if (!payload.category) {
                statusNode.className = 'status error';
                statusNode.textContent = 'Please select a category.';
                return;
            }
            if (!payload.spent_at) {
                statusNode.className = 'status error';
                statusNode.textContent = 'Please specify where the money was spent.';
                return;
            }
            if (!payload.amount || Number(payload.amount) <= 0) {
                statusNode.className = 'status error';
                statusNode.textContent = 'Amount must be greater than 0.';
                return;
            }
            if (payload.is_loan && (!payload.friend_email || !payload.relationship)) {
                statusNode.className = 'status error';
                statusNode.textContent = 'Friend email and relationship are required for loans.';
                return;
            }

            try {
                const response = await fetch('/add_expense', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    statusNode.className = 'status error';
                    statusNode.textContent = data.message || 'Failed to save expense.';
                    return;
                }

                statusNode.className = 'status success';
                statusNode.textContent = `${data.message || 'Expense saved successfully.'} (Saved to: ${data.storage || 'local'})`;
                playCoinClink();
                runMoneyDrop();
                expenseForm.reset();
                setLoanFieldVisibility();
            } catch (error) {
                statusNode.className = 'status error';
                statusNode.textContent = 'Something went wrong. Please try again.';
            }
        });

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
        loanToggle.addEventListener('change', setLoanFieldVisibility);
        historyBtn.addEventListener('click', () => {
            window.location.href = "{{ url_for('expense_history_page') }}";
        });
    </script>
</body>
</html>
