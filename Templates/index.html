<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTreasurer | Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="brand-logo-top">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="YourTreasurer Logo">
    </div>

    <button class="menu-trigger" id="menu-btn">
        <span>☰ Menu</span>
    </button>

    <div class="menu-backdrop" id="menu-backdrop"></div>

     <nav id="side-nav" class="side-nav">
        <button class="close-btn" id="close-btn">&times;</button>
        <div class="nav-links">
            <a href="/" data-bg="{{ url_for('static', filename='images/bg.svg') }}">Home</a>
            <a href="/my_profile" data-bg="{{ url_for('static', filename='images/profile.jpg') }}">My Profile</a>
            <a href="/my_expenses" data-bg="{{ url_for('static', filename='images/expenses.avif') }}">My Expenses</a>
            <a href="/analysis" data-bg="{{ url_for('static', filename='images/Analysis.jpg') }}">Analysis</a>
            <a href="/interval_spend" data-bg="{{ url_for('static', filename='images/interval.jpg') }}">Interval Spend</a>
            <a href="/about_us" data-bg="{{ url_for('static', filename='images/aboutus.png') }}">About Us</a>
        </div>
    </nav>

    <div id="dynamic-bg" class="dynamic-bg" style="background-image: url('{{ url_for('static', filename='images/bg.svg') }}');"></div>
    <div id="hover-bg" class="dynamic-bg hover-layer"></div>

    <div class="main-layout-wrapper">
        <div class="content-container">
            <h1 class="title" id="main-title">YourTreasurer</h1>
            <p class="subtitle">Smart Spending for Smart Ones</p>
            <div id="over-budget-banner" class="over-budget-banner" style="display:none;">
                ⛔ You are over budget! Please review your expenses.
            </div>
        </div>
    </div>
    
    <footer class="common-footer">
        YourTreasurer &copy; 2026 | Helping Hand
    </footer>

   
<script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideNav = document.getElementById('side-nav');
        const backdrop = document.getElementById('menu-backdrop');
        
        const mainBg = document.getElementById('dynamic-bg');
        const hoverBg = document.getElementById('hover-bg');
        const navLinks = document.querySelectorAll('.nav-links a');
        
        // Set default background
        const defaultBg = "{{ url_for('static', filename='images/bg.svg') }}";
        mainBg.style.backgroundImage = `url(${defaultBg})`;

        function toggleMenu() {
            sideNav.classList.toggle('open');
            backdrop.classList.toggle('active');
            if (sideNav.classList.contains('open')) {
                document.body.style.position = 'fixed';
                document.body.style.width = '100%';
            } else {
                document.body.style.position = '';
                // Reset bg when menu closes
                hoverBg.style.opacity = '0';
            }
        }

        // --- Hover Animation Logic ---
        navLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                const newImg = link.getAttribute('data-bg');
                hoverBg.style.backgroundImage = `url(${newImg})`;
                hoverBg.style.opacity = '1';
            });

            link.addEventListener('mouseleave', () => {
                hoverBg.style.opacity = '0';
            });
        });

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);

        // --- Guardian: Over-Budget Pulse ---
        async function checkBudgetStatus() {
            try {
                const res = await fetch('/api/budget_status');
                if (!res.ok) return;
                const data = await res.json();
                if (data.success && data.over_budget) {
                    const title = document.getElementById('main-title');
                    const banner = document.getElementById('over-budget-banner');
                    title.classList.add('over-budget-pulse');
                    banner.style.display = 'block';
                }
            } catch (e) {
                // not logged in or network error — silently ignore
            }
        }
        checkBudgetStatus();
    </script>

    <style>
        @keyframes guardianPulse {
            0%   { color: inherit; text-shadow: none; }
            50%  { color: #ff3333; text-shadow: 0 0 18px #ff3333, 0 0 36px #ff000088; }
            100% { color: inherit; text-shadow: none; }
        }
        .over-budget-pulse {
            animation: guardianPulse 1.2s ease-in-out infinite;
        }
        .over-budget-banner {
            margin-top: 12px;
            padding: 10px 20px;
            background: rgba(255, 51, 51, 0.15);
            border: 1px solid #ff3333;
            border-radius: 8px;
            color: #ff3333;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
    </style>
</body>
</html>
