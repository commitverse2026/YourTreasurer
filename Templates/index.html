
{% extends "base.html" %}

{% block content %}
<div class="content-container">
    <h1 class="title">Dashboard</h1>
    <p class="subtitle">Welcome, {{ session.username }}!</p>

    <!-- Daily Expense & Loan Entry Form -->
    <div class="dashboard-panel glass-form-wrapper">
        <h2>Log an Expense</h2>
        <form id="expenseForm" action="{{ url_for('add_expense') }}" method="POST" class="glass-form">
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Junk Food">Junk Food</option>
                    <option value="Educational">Educational</option>
                    <option value="Travel">Travel</option>
                    <option value="Hostel Rent">Hostel Rent</option>
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Healthy Food">Healthy Food</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" step="0.01" required>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="is_loan" name="is_loan" value="yes"> Is it a Loan?
                </label>
            </div>

            <!-- Hidden Loan Fields -->
            <div id="loan-fields" class="hidden">
                <div class="form-group">
                    <label for="friend_email">Friend's Email</label>
                    <input type="email" id="friend_email" name="friend_email">
                </div>
                <div class="form-group">
                    <label for="friend_relationship">Relationship</label>
                    <input type="text" id="friend_relationship" name="friend_relationship" placeholder="e.g. Roommate">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="trackBtn">
                <span id="btnText">Track Now</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Audio context
    const clinkSound = new Audio("{{ url_for('static', filename='audio/clink.mp3') }}");
    
    // Toggle Loan Fields
    const loanCheckbox = document.getElementById('is_loan');
    const loanFields = document.getElementById('loan-fields');
    loanCheckbox.addEventListener('change', function() {
        if(this.checked) {
            loanFields.classList.remove('hidden');
        } else {
            loanFields.classList.add('hidden');
        }
    });

    // Form Submission & Animations
    const expenseForm = document.getElementById('expenseForm');
    expenseForm.addEventListener('submit', function(e) {
        // Play sound
        clinkSound.play().catch(console.error);
    });
</script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Dashboard</title>
</head>
<body>
    <div class="nav">
        <h2>💰 Treasurer</h2>
        {% if user %}<a href="/logout">Logout</a>{% else %}<a href="/login">Login</a>{% endif %}
    </div>

    <div class="container">
        <div class="card" style="text-align: center;">
            <h3>Monthly Spending</h3>
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <h2 id="text">₹0 / ₹0</h2>
            <p id="status-msg" style="font-size: 0.9rem; color: #94a3b8;"></p>
        </div>

        <a href="/my_expenses" class="btn" style="display: block; text-align: center; text-decoration: none;">View All Expenses</a>
    </div>

    <script>
        function load(){
            fetch('/api/progress').then(r=>r.json()).then(d=>{
                let p = d.progress > 100 ? 100 : d.progress;
                let bar = document.getElementById("bar");
                bar.style.width = p + "%";

                if(p < 60) bar.style.background = "#22c55e";
                else if(p < 85) bar.style.background = "#f59e0b";
                else bar.style.background = "#ef4444";

                document.getElementById("text").innerHTML = `₹${d.spent} / ₹${d.limit}`;
                document.getElementById("status-msg").innerHTML = `${d.progress.toFixed(1)}% of budget used`;
            });
        }
        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
