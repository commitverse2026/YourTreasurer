<head>
     <link rel="stylesheet" href="/static/css/style.css">
</head>
<div class="content-container">
    <h1 class="title">YourTreasurer</h1>
    <p class="subtitle">Secure Budget Gateway</p>

    <form method="POST" action="/my_profile" class="login-box">
        <input type="text" name="name" placeholder="Username" required class="input-field">
        <input type="password" name="password" placeholder="Password" required class="input-field">
        <input type="number" name="limit" placeholder="Monthly Limit (for new users)" class="input-field">
        <button type="submit" class="btn-primary">Access Treasury</button>
    </form>
</div>
